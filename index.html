<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servo Bağıl Kontrol</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #111;
    }
    h1 { font-size: 1.4rem; font-weight: 500; margin-bottom: 6px; }
    #status {
      font-size: 0.82rem;
      padding: 4px 14px;
      border-radius: 20px;
      background: #e0e0e0;
      color: #666;
      margin-bottom: 2rem;
    }
    #status.connected    { background: #d4edda; color: #1e6633; font-weight: 600; }
    #status.error        { background: #fde8e8; color: #b91c1c; font-weight: 600; }
    #status.reconnecting { background: #fef3c7; color: #92400e; font-weight: 600; }

    .card {
      background: black;
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    .gauge-wrap { display: flex; justify-content: center; margin-bottom: 0.5rem; }

    .angle-display {
      text-align: center;
      font-size: 3.5rem;
      font-weight: 500;
      color: #111;
      line-height: 1;
    }
    .angle-label {
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 1.8rem;
      margin-top: 4px;
    }

    .row { display: flex; gap: 8px; margin-bottom: 1.2rem; }
    .row input[type=number] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      text-align: center;
      color: #111;
      outline: none;
      background: white;
    }
    .row input[type=number]:focus { border-color: #3b82f6; }
    .row button.primary {
      padding: 10px 22px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }
    .row button.primary:hover:not(:disabled) { background: #2563eb; }
    .row button.primary:disabled { background: #d1d5db; cursor: not-allowed; }

    .presets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .presets button {
      padding: 10px 4px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: white;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      color: #333;
    }
    .presets button:hover:not(:disabled) { border-color: #3b82f6; color: #3b82f6; background: #f0f6ff; }
    .presets button:disabled { opacity: 0.35; cursor: not-allowed; }
    
    .btn-reset {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-reset:hover:not(:disabled) { background: #dc2626; }
    .btn-reset:disabled { background: #fca5a5; cursor: not-allowed; }

    .sent-wrap {
      margin-top: 1.5rem;
      padding: 10px 14px;
      background: #f9fafb;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sent-wrap span { font-size: 0.78rem; color: #aaa; }
    .sent-wrap strong { font-size: 0.9rem; color: #3b82f6; }
  </style>
</head>
<body>
  <h1>Servo Kontrol</h1>
  <p id="status">Bağlanıyor...</p>

  <div class="card">
    <div class="gauge-wrap">
      <canvas id="gauge" width="220" height="125"></canvas>
    </div>

    <div class="angle-display" id="angleDisplay">180</div>
    <div class="angle-label">Tahmini Mutlak Konum</div>

    <div class="row">
      <input type="number" id="numInput" value="45" placeholder="Örn: -45 veya 90">
      <button class="primary" id="sendBtn" onclick="sendCustom()" disabled>Gönder</button>
    </div>

    <div class="presets">
      <button onclick="sendRelative(-90)" disabled>-90°</button>
      <button onclick="sendRelative(-15)" disabled>-15°</button>
      <button onclick="sendRelative(15)"  disabled>+15°</button>
      <button onclick="sendRelative(90)"  disabled>+90°</button>
    </div>
    
    <button class="btn-reset" onclick="sendReset()" disabled>SIFIRLA (0 Noktasına Git)</button>

    <div class="sent-wrap">
      <span>Son Gönderilen Komut</span>
      <strong id="lastSent">—</strong>
    </div>
  </div>

  <script>
    const BROKER = "342319a9d06340038c3a61d7d58a09a2.s1.eu.hivemq.cloud";
    const PORT   = 8884;
    const USER   = "ademm";
    const PASS   = "0531nNaA";
    const TOPIC  = "evim/servo";

    const statusEl    = document.getElementById("status");
    const angleDisplay= document.getElementById("angleDisplay");
    const numInput    = document.getElementById("numInput");
    const lastSent    = document.getElementById("lastSent");
    const allBtns     = document.querySelectorAll("button");

    let client, reconnectTimer;
    
    // Uygulama kendi içinde ESP32 ile aynı olan 180 başlangıç noktasını tutar
    let localAngle = 180; 

    function setStatus(t, c) { statusEl.textContent = t; statusEl.className = c; }
    function setBtns(e) { allBtns.forEach(b => b.disabled = !e); }

    function drawGauge(angle) {
      const canvas = document.getElementById("gauge");
      const ctx = canvas.getContext("2d");
      const cx = 110, cy = 115, r = 90;
      ctx.clearRect(0, 0, 220, 125);
      
      // Arka plan çizgisi
      ctx.beginPath();
      ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI);
      ctx.strokeStyle = "#f0f0f0";
      ctx.lineWidth = 16;
      ctx.lineCap = "round";
      ctx.stroke();
      
      // Dolu çizgi
      const progress = (angle / 360) * Math.PI;
      if (progress > 0) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, Math.PI, Math.PI + progress);
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth = 16;
        ctx.lineCap = "round";
        ctx.stroke();
      }
      
      // Uç noktası topu
      const nx = cx + r * Math.cos(Math.PI + progress);
      const ny = cy + r * Math.sin(Math.PI + progress);
      ctx.beginPath();
      ctx.arc(nx, ny, 9, 0, 2 * Math.PI);
      ctx.fillStyle = "#3b82f6";
      ctx.fill();
      
      // Merkez noktası
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
      ctx.fillStyle = "#cbd5e1";
      ctx.fill();
    }

    // Arayüzdeki ibreyi tahmini olarak güncelleyen fonksiyon
    function updateLocalDisplay(change) {
      localAngle += change;
      localAngle = Math.max(0, Math.min(360, localAngle)); // ESP32'deki constrain mantığının aynısı
      angleDisplay.textContent = localAngle;
      drawGauge(localAngle);
    }

    // Gönder butonu tıklandığında (Serbest sayı)
    function sendCustom() {
      const val = parseInt(numInput.value);
      if (isNaN(val)) return;
      sendRelative(val);
    }

    // Eksi veya artı komutu MQTT'ye gönderen fonksiyon
    function sendRelative(val) {
      if (!client || !client.isConnected()) {
        setStatus("Bağlı değil, yeniden bağlanıyor...", "reconnecting");
        connect();
        return;
      }
      
      // Değeri doğrudan string olarak yolla (Örn: "-45" veya "90")
      const msg = new Paho.Message(String(val));
      msg.destinationName = TOPIC;
      msg.qos = 1;
      client.send(msg);
      
      // Arayüzü güncelle
      updateLocalDisplay(val);
      
      // Ekrana yaz (Pozitifse başına + koy)
      lastSent.textContent = (val > 0 ? "+" : "") + val;
    }
    
    // Özel SIFIRLA Komutu
    function sendReset() {
      if (!client || !client.isConnected()) return;
      const msg = new Paho.Message("RESET");
      msg.destinationName = TOPIC;
      msg.qos = 1;
      client.send(msg);
      
      localAngle = 0;
      angleDisplay.textContent = localAngle;
      drawGauge(localAngle);
      lastSent.textContent = "RESET";
    }

    numInput.addEventListener("keydown", e => { if (e.key === "Enter") sendCustom(); });

    function connect() {
      clearTimeout(reconnectTimer);
      const clientId = "Web-" + Math.floor(Math.random() * 99999);
      client = new Paho.Client(BROKER, PORT, "/mqtt", clientId);
      client.onConnectionLost = () => {
        setStatus("Bağlantı koptu, yeniden bağlanıyor...", "reconnecting");
        setBtns(false);
        reconnectTimer = setTimeout(connect, 3000);
      };
      setStatus("Bağlanıyor...", "");
      client.connect({
        useSSL: true,
        userName: USER,
        password: PASS,
        keepAliveInterval: 30,
        onSuccess: () => { setStatus("Bağlı", "connected"); setBtns(true); },
        onFailure: (err) => {
          setStatus("Bağlanamadı: " + err.errorMessage, "error");
          setBtns(false);
          reconnectTimer = setTimeout(connect, 5000);
        }
      });
    }

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && (!client || !client.isConnected())) connect();
    });

    // Başlangıçta ibreyi 180'e hizala
    drawGauge(180);
    connect();
  </script>
</body>
</html>
